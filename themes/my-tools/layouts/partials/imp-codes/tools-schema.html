<!-- Tools SCHEMA -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    
    {
      "@type": "WebSite",
      "name": "Gajab Tools",
      "alternateName": "gajabtools.com",
      "url": "https://www.gajabtools.com/"
    },

    {
      "@type": "SoftwareApplication",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ .Permalink }}"
      },
      "headline": "{{ .Title }}",
      "description": "{{ .Params.description | default "Get complete details about this tool, features, usage, and benefits." }}",
      "image": "{{ .Params.featuredImage | absURL }}",
      "author": {
        "@type": "Organization",
        "name": "Gajab Tools",
        "url": "https://www.gajabtools.com/"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Gajab Tools",
        "logo": {
          "@type": "ImageObject",
          "url": "{{ "images/logo.png" | absURL }}"
        }
      },
      "datePublished": "{{ with .Date }}{{ .Format "2006-01-02" }}{{ else }}{{ now.Format "2006-01-02" }}{{ end }}",
      "dateModified": "{{ with .Lastmod }}{{ .Format "2006-01-02" }}{{ else }}{{ now.Format "2006-01-02" }}{{ end }}",
      "inLanguage": "en",
      "applicationCategory": "UtilitiesApplication"
    }

  ]
}
</script>
