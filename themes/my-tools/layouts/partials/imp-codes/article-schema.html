<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "https://www.gajabtools.com{{ .RelPermalink }}"
  },
  "headline": "{{ .Title }}",
  "description": "{{ .Params.description | default "Get complete details about this tool, features, usage, and benefits." | safeJS }}",
  "image": "{{ .Params.BannerImage | absURL }}",
  "author": {
    "@type": "Organization",
    "name": "Gajab Tools",
    "url": "https://www.gajabtools.com/"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Gajab Tools",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ "https://www.gajabtools.com/android-chrome-192x192.png" | absURL }}"
    }
  },
  "datePublished": "{{ with .Date }}{{ .Format "2006-01-02T15:04:05Z07:00" }}{{ else }}{{ now.Format "2006-01-02T15:04:05Z07:00" }}{{ end }}",
"dateModified": "{{ with .Lastmod }}{{ .Format "2006-01-02T15:04:05Z07:00" }}{{ else }}{{ now.Format "2006-01-02T15:04:05Z07:00" }}{{ end }}",
  "inLanguage": "en",
  "articleSection": "Tools"{{ with .Params.tags }},
  "keywords": "{{ delimit . ", " }}"{{ end }}
}
</script>
