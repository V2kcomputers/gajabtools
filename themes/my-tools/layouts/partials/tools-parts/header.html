<style>
.tool-header{
    position:sticky;
    top:0;
    z-index:1000;
    background:#ffffff;
    border-bottom:1px solid #e5e7eb;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.tool-container{
    max-width:1200px;
    margin:auto;
    padding:12px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.tool-logo{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
}

.tool-logo img{
    width:40px;
    height:40px;
}

.tool-logo span{
    font-size:20px;
    font-weight:700;
    color:#111827;
}

.tool-nav{
    display:flex;
    align-items:center;
    gap:10px;
}

.tool-nav a,
.tool-nav button{
    border:none;
    background:#f3f4f6;
    color:#111827;
    padding:10px 15px;
    border-radius:8px;
    text-decoration:none;
    cursor:pointer;
    transition:.3s;
}

.tool-nav a:hover,
.tool-nav button:hover{
    background:#2563eb;
    color:#fff;
}
.tool-footer{
    background:#111827;
    color:#ffffff;
    margin-top:40px;
}

.tool-footer-container{
    max-width:1200px;
    margin:auto;
    padding:30px 20px;
    display:flex;
    justify-content:space-between;
    gap:30px;
    flex-wrap:wrap;
}

.tool-footer-brand h3{
    margin-bottom:10px;
}

.tool-footer-brand p{
    color:#d1d5db;
    line-height:1.6;
}

.tool-footer-links{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.tool-footer-links a{
    color:#d1d5db;
    text-decoration:none;
}

.tool-footer-links a:hover{
    color:#ffffff;
}

.tool-footer-bottom{
    text-align:center;
    padding:15px;
    border-top:1px solid rgba(255,255,255,.1);
    color:#9ca3af;
    font-size:14px;
}

</style>


<header class="tool-header">
    <div class="tool-container">

        <a href="/" class="tool-logo">
            <img src="/android-chrome-192x192.png" alt="Logo">
            <span>Gajab Tools</span>
        </a>

        <nav class="tool-nav">

            <a href="/">
                <i class="fa-solid fa-house"></i>
                Home
            </a>

            <a href="/tools/">
                <i class="fa-solid fa-screwdriver-wrench"></i>
                All Tools
            </a>

            <button id="searchBtn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>

        </nav>

    </div>
</header>
