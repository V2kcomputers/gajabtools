<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Religious Symbol Library</title>

<style>
:root{
    --primary:#b38a24;
    --bg:#f5f6fa;
    --card:#ffffff;
    --border:#e5e7eb;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:var(--bg);
    font-family:Segoe UI,sans-serif;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    margin:0;
    color:#333;
}

.header p{
    color:#666;
}

.toolbar{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.toolbar input,
.toolbar select{
    padding:12px;
    border:1px solid var(--border);
    border-radius:10px;
    font-size:15px;
}

.toolbar input{
    flex:1;
    min-width:250px;
}

.symbol-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(150px,1fr));
    gap:20px;
}

.symbol-card{
    background:var(--card);
    border:2px solid var(--border);
    border-radius:14px;
    padding:15px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}

.symbol-card:hover{
    border-color:var(--primary);
    transform:translateY(-4px);
    box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.symbol-card img{
    width:80px;
    height:80px;
    object-fit:contain;
}

.symbol-card span{
    display:block;
    margin-top:10px;
    font-weight:600;
    color:#333;
}

.category{
    font-size:12px;
    color:#888;
    margin-top:5px;
}
</style>
</head>
<body>

<div class="header">
    <h1>Religious Symbol Library</h1>
    <p>Select any symbol to use in Biodata</p>
</div>

<div class="toolbar">

    <input
    type="text"
    id="searchBox"
    placeholder="Search Symbol...">

    <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="hindu">Hindu</option>
        <option value="islam">Islam</option>
        <option value="sikh">Sikh</option>
        <option value="christian">Christian</option>
        <option value="jain">Jain</option>
        <option value="buddhist">Buddhist</option>
    </select>

</div>



<div class="symbol-grid">

{{ range site.Data.symbols.items }}

<div class="symbol-card"
     data-category="{{ .category }}"
     data-name="{{ .slug }}"
     data-url="{{ .image }}"
     onclick="selectSymbol(this.dataset.url)">

    <img
        src="{{ .image }}"
        alt="{{ .name }}">

    <span>{{ .name }}</span>

    <div class="category">
        {{ .category | title }}
    </div>

</div>

{{ end }}

</div>


<script>

function selectSymbol(url){

    if(window.opener){

        window.opener.postMessage({
            type:"selected-symbol",
            url:url
        },"*");

        window.close();

    }else{

        alert(
        "This page must be opened from Biodata Generator."
        );

    }

}

const searchBox =
document.getElementById(
"searchBox"
);

const categoryFilter =
document.getElementById(
"categoryFilter"
);

function filterSymbols(){

    const search =
    searchBox.value.toLowerCase();

    const category =
    categoryFilter.value;

    document
    .querySelectorAll(".symbol-card")
    .forEach(card=>{

        const name =
        card.dataset.name.toLowerCase();

        const cardCategory =
        card.dataset.category;

        const matchSearch =
        name.includes(search);

        const matchCategory =
        category === "all" ||
        cardCategory === category;

        card.style.display =
        matchSearch &&
        matchCategory
        ? "block"
        : "none";

    });

}

searchBox.addEventListener(
"input",
filterSymbols
);

categoryFilter.addEventListener(
"change",
filterSymbols
);

</script>



<script>
function selectSymbol(url){

    if(window.opener){

        window.opener.postMessage({
            type:"selected-symbol",
            url:url
        },"*");

        window.close();
    }

}
function selectSymbol(url){

window.parent.postMessage({
    type:"selected-symbol",
    url:url
},"*");

}
</script>

</body>
</html>
