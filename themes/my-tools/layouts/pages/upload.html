<!DOCTYPE html>
<html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<title>Image Library</title>
<style>
:root{
  --primary:#e11d48;
  --bg:#f8fafc;
  --card:#fff;
}

body{
  margin:0;
  padding:5px;
  background:var(--bg);
  font-family:Inter,sans-serif;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.title-box h1{
    margin:0;
    font-size:32px;
    color:#111827;
}

.title-box p{
    margin-top:6px;
    color:#64748b;
}

.search-box{
    flex:1;
    max-width:400px;
}

.search-box input{
    width:100%;
    padding:14px 18px;
    border:none;
    border-radius:14px;
    background:#fff;
    box-shadow:
    0 5px 15px rgba(0,0,0,.08);
    font-size:15px;
}

#drop{
    background:
    linear-gradient(
        135deg,
        #fff,
        #fff5f7
    );

    border:3px dashed #f43f5e;

    border-radius:24px;

    padding:50px;

    text-align:center;

    transition:.3s;

    box-shadow:
    0 15px 35px rgba(0,0,0,.08);
}

#drop.dragover{
    background:
    linear-gradient(
        135deg,
        #ffe4e6,
        #fff1f2
    );

    transform:scale(1.01);
}

.upload-content{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
}

.upload-icon{
    font-size:60px;
}

.upload-content h3{
    margin:0;
    color:#111827;
}

.upload-content p{
    margin:0;
    color:#64748b;
}

.upload-btn{
    margin-top:10px;

    padding:
    14px 28px;

    border-radius:14px;

    background:
    linear-gradient(
        135deg,
        #e11d48,
        #fb7185
    );

    color:white;

    cursor:pointer;

    font-weight:600;

    transition:.3s;
}

.upload-btn:hover{
    transform:translateY(-2px);
}
#rotationSlider{
    width:250px;
}
@media(max-width:768px){

    .top-bar{
        flex-direction:column;
        align-items:stretch;
    }

    .search-box{
        max-width:100%;
    }

    #drop{
        padding:30px;
    }

}

#gallery{
  display:grid;
  grid-template-columns:
  repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  margin-top:25px;
}

.card{
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:
  0 10px 25px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  cursor:grab;
}

.card-body{
  padding:15px;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.actions button{
  flex:1;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
.crop-toolbar{
    display:flex;
    align-items:center;
    margin:auto;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
    padding:15px;
    border-radius:18px;
    background:#f8fafc;

}

.crop-toolbar button{
    border:none;
    cursor:pointer;
    font-weight:600;
    transition:.25s;
}

.crop-toolbar button:hover{
    transform:translateY(-2px);
}

.primary-btn{
    padding:12px 18px;
    border-radius:12px;
    color:#fff;
    background:linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );
}

.success-btn{
    padding:12px 18px;
    border-radius:12px;
    color:#fff;
    background:linear-gradient(
        135deg,
        #16a34a,
        #22c55e
    );
}

.warning-btn{
    padding:12px 18px;
    border-radius:12px;
    color:#fff;
    background:linear-gradient(
        135deg,
        #f59e0b,
        #fbbf24
    );
}

.danger-btn{
    padding:12px 18px;
    border-radius:12px;
    color:#fff;
    background:linear-gradient(
        135deg,
        #dc2626,
        #ef4444
    );
}

.icon-btn{
    width:48px;
    height:48px;
    border-radius:50%;
    font-size:22px;
    background:#fff;
    box-shadow:
    0 5px 15px rgba(0,0,0,.1);
}

.rotation-box{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 15px;
    border-radius:14px;
    background:#fff;
    box-shadow:
    0 5px 15px rgba(0,0,0,.08);
}

.rotate-label{
    font-weight:600;
    color:#334155;
}

#rotationSlider{
    width:220px;
}

#rotationValue{
    min-width:50px;
    text-align:center;
    font-weight:700;
    color:#e11d48;
}
.crop-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.crop-header h3{
    margin:0;
    font-size:20px;
    color:#111827;
}

.crop-close{
    width:52px;
    height:52px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    position: absolute;
    font-size:20px;
    font-weight:bold;
    z-index: 999;
    color:#fff;
    right: 40px;
    top: 40px;
    background:
    linear-gradient(
        135deg,
        #ef4444,
        #dc2626
    );

    transition:.25s;
}

.crop-close:hover{
    transform:scale(1.08);
}

@media(max-width:768px){

 .crop-toolbar{
    display:flex;
    align-items:center;
    justify-content:flex-start;

    gap:12px;
    padding:15px;

    overflow-x:auto;
    overflow-y:hidden;

    flex-wrap:nowrap;

    background:#f8fafc;
    border-radius:18px;

    -webkit-overflow-scrolling:touch;
    scrollbar-width:thin;
}

.crop-toolbar > *{
    flex-shrink:0;
}

    #rotationSlider{
        width:180px;
    }

}

/* Crop Modal Box */
#cropModal > div{
    width:100%;
    max-width:880px;
    max-height:90vh;
    overflow:auto;
    padding:15px;
    border-radius:16px;
}

/* Crop Image */
#cropImage{
    display:block;
    width:100%;
    max-width:100%;
    max-height:70vh;
    object-fit:contain;
}
}
/* Desktop */
@media (min-width:769px){
    #cropModal > div{
        max-width:880px;
    }


    #cropImage{
        max-height:55vh;
    }
}

/* Mobile */
@media (max-width:768px){
.crop-close{
    width:32px;
    height:32px;
    right: 30px;
    top: 20px;
    transition:.25s;
}
    #cropModal{
        padding:10px !important;
    }

    #cropModal > div{
        width:100%;
        padding:12px;
        border-radius:14px;
    }

    .crop-header h3{
        font-size:18px;
    }

    .crop-toolbar{
        gap:8px;
        padding:10px;
    }

    .crop-toolbar button{
        font-size:14px;
    }

    #cropImage{
        max-height:35vh;
    }

    #rotationSlider{
        width:140px !important;
    }
}
.cropper-bg{
    background-image:
        linear-gradient(45deg,#f1f5f9 25%,transparent 25%),
        linear-gradient(-45deg,#f1f5f9 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#f1f5f9 75%),
        linear-gradient(-45deg,transparent 75%,#f1f5f9 75%);
    background-size:20px 20px;
}

@media (max-width:600px){

/* Crop Modal Box */
#cropModal > div{
    width:90%;
    max-width:90vh;
    max-height:90vh;
    overflow:auto;
    padding:5px;
    border-radius:16px;
    position: absolute;
left:0;
}

/* Crop Image */
#cropImage{
    display:block;
    width:85%;
    max-width:90%;
    max-height:70vh;
    object-fit:contain;
}
.crop-toolbar {position:relative;
left:0;
top:60vh;
width:90vh;}
}
</style></head><body>

<div class="top-bar">

    <div class="title-box">
        <h1>🖼️ Image Library</h1>
        <p>Upload, Crop & Manage Images</p>
    </div>


</div>

<div id="drop">

    <div class="upload-content">

        <div class="upload-icon">
            ☁️
        </div>

        <h3>
            Drag & Drop Images
        </h3>

        <p>
            Upload JPG, PNG, WEBP Images
        </p>

        <label class="upload-btn">

            Select Images

            <input
                type="file"
                id="files"
                multiple
                accept="image/*"
                hidden
            >

        </label>

    </div>
</div>
<br>
   <div class="search-box">
        <input
            type="text"
            id="search"
            placeholder="🔍 Search images..."
        >
    </div>
<div id='gallery'></div>
    
<div id="cropModal" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
z-index:9999;
padding:20px;
">
 
<div style="
background:#fff;
margin:auto;
padding:20px;
border-radius:20px;
">


   <button
        id="cropCancel"
        class="crop-close"
    >
        ✕
    </button>


<img id="cropImage" style="

display:block;
margin:auto;
">

<div style="
display:flex;
gap:10px;
margin-top:15px;
justify-content:center;
flex-wrap:wrap;
">

</div>
</div>
<div class="crop-toolbar">
<div class="rotation-box">
    <button id="cropApplySelect" class="primary-btn">
        ✓ Apply
    </button>
   <button id="zoomReset" class="icon-btn">⛶</button>
   <button id="zoomOut" class="icon-btn">−</button>
<button id="zoomIn" class="icon-btn"> +</button>
   </div>
   <div class="rotation-box">

        <span class="rotate-label">
            <button id="rotateLeft" class="icon-btn">
        ↺
    </button>
    <button id="rotateRight" class="icon-btn">
        ↻
    </button>
        </span>

        <input
            type="range"
            id="rotationSlider"
            min="-180"
            max="180"
            value="0"
            step="1"
        >

        <span id="rotationValue">
            0°
        </span>
       <button id="resetCrop" class="icon-btn">
        🔄️
    </button>
    </div>
    <div class="rotation-box">


    <button id="cropSave" class="icon-btn">
        💾
    </button>

 </div>
</div>
</div>
<script>
let db;
let cropper = null;
let currentCropFile = null;
let currentCropId = null;
let currentRotation = 0;
const isIframe = window.self !== window.top;
const req = indexedDB.open("ImageLibrary", 1);

req.onupgradeneeded = (e) => {
    e.target.result.createObjectStore("images", {
        keyPath: "id",
        autoIncrement: true
    });
};

req.onsuccess = (e) => {
    db = e.target.result;
    load();
};

// Upload Input
document.getElementById("files").addEventListener("change", (e) => {
    save([...e.target.files]);
});

// Drag & Drop Upload
const drop = document.getElementById("drop");

drop.addEventListener("dragover", (e) => {
    e.preventDefault();
    drop.style.borderColor = "#e11d48";
});

drop.addEventListener("dragleave", () => {
    drop.style.borderColor = "#cbd5e1";
});

drop.addEventListener("drop", (e) => {
    e.preventDefault();
    drop.style.borderColor = "#cbd5e1";

    const files = [...e.dataTransfer.files];

    save(files);
});

// Save Images
function save(files){

    // Multiple Images
    if(files.length > 1){

        files.forEach(file=>{

            if(!file.type.startsWith("image/"))
                return;

            const reader =
            new FileReader();

            reader.onload = ()=>{

                const tx =
                db.transaction(
                    "images",
                    "readwrite"
                );

                tx.objectStore(
                    "images"
                ).add({

                    name:file.name,

                    data:reader.result,

                    created:Date.now()

                });

                tx.oncomplete =
                load;

            };

            reader.readAsDataURL(
                file
            );

        });

        return;

    }

    // Single Image = Cropper
    const file = files[0];

    if(!file) return;

    const reader =
    new FileReader();
 
    reader.onload = ()=>{

        openCropper(
            reader.result,
            file.name
        );

    };

    reader.readAsDataURL(
        file
    );

}
document
.getElementById("cropSave")
.onclick = ()=>{

    const canvas =
    cropper.getCroppedCanvas({
        imageSmoothingQuality:"high"
    });

    const cropped =
    canvas.toDataURL(
        "image/png",
        1
    );

    if(currentCropId){

        updateCroppedImage(
            currentCropId,
            cropped
        );

    }else{

        const tx =
        db.transaction(
            "images",
            "readwrite"
        );

        tx.objectStore("images")
        .add({
            name: currentCropFile,
            data: cropped,
            created: Date.now()
        });

        tx.oncomplete = ()=>{
            closeCropper();
            load();
        };

    }

};
document
.getElementById("cropApplySelect")
.onclick = ()=>{

    const canvas =
    cropper.getCroppedCanvas({
        imageSmoothingQuality:"high"
    });

    const cropped =
    canvas.toDataURL(
        "image/png",
        1
    );

    if(currentCropId){

        updateCroppedAndSelect(
            currentCropId,
            cropped
        );

    }else{

        const tx =
        db.transaction(
            "images",
            "readwrite"
        );

        const req =
        tx.objectStore("images")
        .add({
            name: currentCropFile,
            data: cropped,
            created: Date.now()
        });

        req.onsuccess = (e)=>{

            selectImage(
                e.target.result
            );

        };

    }

};
document
.getElementById("cropCancel")
.onclick =
closeCropper;

function closeCropper(){

    document
    .getElementById(
        "cropModal"
    )
    .style.display="none";

    if(cropper){

        cropper.destroy();

        cropper=null;

    }

}
// Load Gallery
function load() {

    const gallery =
        document.getElementById("gallery");

    gallery.innerHTML = "";

    const search =
        document
        .getElementById("search")
        .value
        .toLowerCase();

    const tx =
        db.transaction(
            "images",
            "readonly"
        );

    const store =
        tx.objectStore("images");

    store.openCursor(null, "prev").onsuccess = (e) => {

        const cursor = e.target.result;

        if (!cursor) return;

        const image = cursor.value;

        if (
            image.name
            .toLowerCase()
            .includes(search)
        ) {

            const card =
                document.createElement("div");

            card.className = "card";

            card.innerHTML = `
              <img
    src="${image.data}"
    draggable="true"
    onclick="selectImage(${cursor.key})"
>

                <div class="card-body">

                    <p>
                        ${image.name}
                    </p>

                    <div class="actions">

                        <button onclick="selectImage(${cursor.key})">
                            Select
                        </button>
                        <button onclick="cropExisting(${cursor.key})">
                         Crop
                           </button>
                        <button onclick="renameImg(${cursor.key})">
                            Rename
                        </button>

                        <button onclick="deleteImg(${cursor.key})">
                            Delete
                        </button>

                    </div>

                </div>
            `;

            // Drag Image To Other Pages
            const img =
                card.querySelector("img");
                img.addEventListener("click",()=>{
});
        
            img.addEventListener(
                "dragstart",
                (ev) => {

                    ev.dataTransfer.setData(
                        "text/plain",
                        image.data
                    );

                }
            );

            gallery.appendChild(card);

        }

        cursor.continue();

    };

}

// Search
document
.getElementById("search")
.addEventListener(
    "input",
    load
);

// Delete
function deleteImg(id) {

    if (
        !confirm(
            "Delete image?"
        )
    ) return;

    const tx =
        db.transaction(
            "images",
            "readwrite"
        );

    tx.objectStore("images")
      .delete(id);

    tx.oncomplete = load;

}

// Rename
function renameImg(id) {

    const newName =
        prompt(
            "Enter new name"
        );

    if (!newName) return;

    const tx =
        db.transaction(
            "images",
            "readwrite"
        );

    const store =
        tx.objectStore("images");

    const req =
        store.get(id);

    req.onsuccess = () => {

        const image =
            req.result;

        image.name =
            newName;

        store.put(image);

    };

    tx.oncomplete = load;

}

function selectImage(id) {

    const tx = db.transaction("images", "readonly");

    const req = tx.objectStore("images").get(id);

    req.onsuccess = () => {

        const image = req.result;

        const mode = new URLSearchParams(location.search).get("select");

        let messageType = "selected-image";

        if (mode === "photo") {
            messageType = "selected-photo";
        }

        if (mode === "symbol") {
            messageType = "selected-symbol";
        }

        if (isIframe) {

            window.parent.postMessage({
                type: messageType,
                image: image.data,
                name: image.name
            }, "*");

            return;
        }

        if (window.opener) {

            window.opener.postMessage({
                type: messageType,
                image: image.data,
                name: image.name
            }, "*");

            window.close();
            return;
        }

        localStorage.setItem("selectedImage", image.data);

        alert("Image Selected");
    };
}
</script>
<script>
    function openCropper(
    imageData,
    fileName,
    imageId=null
){

    currentCropFile = fileName;
    currentCropId = imageId;

    const modal =
    document.getElementById(
        "cropModal"
    );

    const image =
    document.getElementById(
        "cropImage"
    );
    currentRotation = 0;

document.getElementById(
    "rotationSlider"
).value = 0;

document.getElementById(
    "rotationValue"
).innerText = "0°";
    image.src = imageData;

    modal.style.display="block";

    image.onload = ()=>{

        if(cropper)
            cropper.destroy();

    cropper = new Cropper(image,{
    viewMode:1,
    autoCropArea:0.9,
    responsive:true,
    restore:false,
    guides:true,
    center:true,
    background:true,
    highlight:true,
    movable:true,
    zoomable:true,
    scalable:true,
    rotatable:true
});

    };

}
function cropExisting(id){

    const tx =
    db.transaction(
        "images",
        "readonly"
    );

    const req =
    tx.objectStore("images")
      .get(id);

    req.onsuccess = ()=>{

        const image =
        req.result;

        openCropper(
            image.data,
            image.name,
            id
        );

    };

}
function updateCroppedImage(
    id,
    newData
){

    const tx =
    db.transaction(
        "images",
        "readwrite"
    );

    const store =
    tx.objectStore(
        "images"
    );

    const req =
    store.get(id);

    req.onsuccess = ()=>{

        const image =
        req.result;

        image.data =
        newData;

        store.put(image);

    };

    tx.oncomplete = ()=>{

        closeCropper();

        load();

    };

}
window.cropExisting = cropExisting;
window.renameImg = renameImg;
window.deleteImg = deleteImg;
window.selectImage = selectImage;
document
document
.getElementById("rotateLeft")
.onclick = ()=>{

    currentRotation -= 1;

    if(currentRotation < -180)
        currentRotation = -180;

    cropper.rotateTo(
        currentRotation
    );

    rotationSlider.value =
    currentRotation;

    rotationValue.innerText =
    currentRotation + "°";

};

document
.getElementById("rotateRight")
.onclick = ()=>{

    currentRotation += 1;

    if(currentRotation > 180)
        currentRotation = 180;

    cropper.rotateTo(
        currentRotation
    );

    rotationSlider.value =
    currentRotation;

    rotationValue.innerText =
    currentRotation + "°";

};

</script>
<script>
    function updateCroppedAndSelect(
    id,
    newData
){

    const tx =
    db.transaction(
        "images",
        "readwrite"
    );

    const store =
    tx.objectStore(
        "images"
    );

    const req =
    store.get(id);

    req.onsuccess = ()=>{

        const image =
        req.result;

        image.data =
        newData;

        store.put(image);

    };

    tx.oncomplete = ()=>{

        closeCropper();

        selectImage(id);

        load();

    };

}
</script>
<script>
    const rotationSlider =
document.getElementById(
    "rotationSlider"
);

rotationSlider.addEventListener(
    "input",
    function(){

        currentRotation =
        parseInt(this.value);

        document
        .getElementById(
            "rotationValue"
        )
        .innerText =
        currentRotation + "°";

        if(cropper){

            cropper.rotateTo(
                currentRotation
            );

        }

    }
);
</script>
<script>
    document
.getElementById("resetCrop")
.onclick = ()=>{

    cropper.reset();

    rotationSlider.value = 0;

    rotationValue.innerText = "0°";

};
</script>
<script>
let currentZoom = 1;

document.getElementById("zoomIn").onclick = () => {
    if(cropper){
        currentZoom += 0.1;
        cropper.zoom(0.1);
    }
};

document.getElementById("zoomOut").onclick = () => {
    if(cropper){
        currentZoom -= 0.1;
        cropper.zoom(-0.1);
    }
};

document.getElementById("zoomReset").onclick = () => {
    if(cropper){
        cropper.zoomTo(0);
        currentZoom = 1;
    }
};
</script>

</body></html>
