
{{ define "main" }}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> List Card Design  </title>

<style>

/* Card */
.card {
    display: flex;
    align-items: center;
    background:var(--card);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* Image */
.card img {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    object-fit: cover;
    margin-right: 12px;
}

/* Content */
.card-content {
    flex: 1;
}

/* Title */
.card-title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 5px;
}

/* Description (2 line limit) */
.card-desc {
    font-size: 14px;
    color: #555;

    display: -webkit-box;
    -webkit-line-clamp: 2;   /* 2 lines */
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>

</head>
<body>

<div class="card-list">

{{ range sort (where .Site.RegularPages "Draft" false) "Date" "desc" }}

  <div class="card">
    <img src="{{ .Params.image | default "/images/default.jpg" }}" alt="{{ .Title }}">

    <div class="card-content">
      <div class="card-title">
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </div>

      <div class="card-desc">
        {{ .Params.description | default .Summary }}
      </div>
    </div>
  </div>

{{ end }}

</div>
</body>
</html>
{{ end }}
